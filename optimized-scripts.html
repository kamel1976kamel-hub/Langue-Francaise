<!-- Scripts IA (chargement conditionnel) -->
<script>
// Charger les scripts IA uniquement si nécessaire
function loadIAScripts() {
    const iaScripts = [
        './pipeline-config-interface.js',
        './pipeline-models-checker.js',
        './streaming-pipeline.js',
        './specific-pipeline-fixed.js',
        './rag-service.js',
        './rag-setup.js',
        './rag-huggingface.js'
    ];
    
    iaScripts.forEach(script => {
        const scriptElement = document.createElement('script');
        scriptElement.src = script;
        scriptElement.defer = true;
        document.head.appendChild(scriptElement);
    });
}

// Charger les scripts spaCy uniquement si demandé
function loadSpacyScripts() {
    const spacyScripts = [
        './spacy-lg-interface.js',
        './spacy-custom-rules.js',
        './spacy-operational-rules.js',
        './spacy-rule-examples.js',
        './spacy-rules-loader.js',
        './spacy-rules-orthographe.js',
        './spacy-rules-style.js',
        './spacy-specific-rules.js',
        './spacy-worker-pool.js',
        './spacy-rules-converter.js',
        './spacy-rules-conjugaison-fixed.js'
    ];
    
    spacyScripts.forEach(script => {
        const scriptElement = document.createElement('script');
        scriptElement.src = script;
        scriptElement.defer = true;
        document.head.appendChild(scriptElement);
    });
}

// Détecter quand charger les scripts avancés
document.addEventListener('DOMContentLoaded', function() {
    // Charger les scripts IA après 2 secondes
    setTimeout(loadIAScripts, 2000);
    
    // Charger spaCy uniquement si l'utilisateur le demande
    const enableSpacy = localStorage.getItem('enable_spacy') === 'true';
    if (enableSpacy) {
        setTimeout(loadSpacyScripts, 3000);
    }
});
</script>

<!-- Scripts utilitaires (chargement différé) -->
<script defer src="./comptes-etudiants.js"></script>
<script defer src="./ia.js"></script>
